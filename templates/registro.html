<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SISTPEC</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        📝 Registro de Usuario
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Usuario
                            </label>

                            <input type="text"
                                   name="nombre"
                                   class="form-control"
                                   placeholder="Ingresa tu nombre de usuario"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Contraseña
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Ingresa tu contraseña"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Rol
                            </label>

                            <select name="rol"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Seleccione un rol
                                </option>

                                <option value="encargado">
                                    Encargado
                                </option>

                                <option value="alumno">
                                    Alumno
                                </option>

                                <option value="ciudadano">
                                    Ciudadano
                                </option>

                            </select>

                        </div>

                        <div class="d-flex justify-content-between">

                            <button type="submit"
                                    class="btn btn-primary">

                                ✅ Registrar

                            </button>

                            <a href="/login"
                               class="btn btn-secondary">

                                ↩️ Volver al login

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
